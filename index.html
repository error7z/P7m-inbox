<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | Enterprise v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); }
        body { background-color: #030406; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 300% 300%; animation: rb-move 4s linear infinite; border-radius: 16px; }
        @keyframes rb-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(10, 11, 16, 0.98); backdrop-filter: blur(20px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .input-glow { background: #08090d; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; outline: none; transition: 0.3s; width: 100%; font-size: 12px; }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .btn-action { transition: 0.2s; cursor: pointer; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }
        #log-container { height: 400px; overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-6">
        <div class="col-span-3 space-y-4">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg></div>
                <h1 class="text-xl font-black tracking-tighter uppercase">P7M <span class="text-blue-500">ULTRA</span></h1>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Protocol Strategy</p>
                    <select id="send-mode" class="input-glow save-data">
                        <option value="raw">Raw Send (Default)</option>
                        <option value="smart">Smart Engine (Randomized)</option>
                    </select>
                    
                    <div class="bg-black/40 p-3 rounded-lg border border-white/5 space-y-2">
                        <span class="text-[9px] text-zinc-500 uppercase font-bold">Attachment & Auto-Compress</span>
                        <input type="file" id="f-attach" class="text-[10px] w-full text-zinc-400">
                        <div id="file-info" class="text-[9px] text-zinc-500 font-bold uppercase">Ready</div>
                    </div>

                    <input type="number" id="send-delay" placeholder="Delay (MS)" value="5000" class="input-glow save-data">
                </div>
            </div>

            <div class="glass-card p-5 border-b-4 border-blue-600">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-zinc-900 p-3 rounded-xl text-center"><span class="text-[9px] text-zinc-500 uppercase font-bold">Inbox</span><p id="v-sent" class="text-3xl font-black text-green-500">0</p></div>
                    <div class="bg-zinc-900 p-3 rounded-xl text-center"><span class="text-[9px] text-zinc-500 uppercase font-bold">Block</span><p id="v-fail" class="text-3xl font-black text-red-500">0</p></div>
                </div>
                <button onclick="launch()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase tracking-widest btn-action">Initiate Blast</button>
                <button onclick="forceStop()" id="btn-stop" class="w-full bg-red-900/20 text-red-500 border border-red-500/50 py-4 rounded-xl font-black text-xs uppercase hidden">Emergency Stop</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="premium-border"><div class="glass-card p-4">
                    <span class="text-[10px] font-bold text-zinc-400 uppercase">SMTP Stack: <b id="count-smtp" class="text-blue-500">0</b></span>
                    <input type="file" id="f-smtp" accept=".csv" class="text-[10px] w-full mt-2">
                </div></div>
                <div class="premium-border"><div class="glass-card p-4">
                    <span class="text-[10px] font-bold text-zinc-400 uppercase">Targets: <b id="count-target" class="text-green-500">0</b></span>
                    <input type="file" id="f-target" accept=".csv" class="text-[10px] w-full mt-2">
                </div></div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-5 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-name" placeholder="Sender Name" class="input-glow save-data">
                        <input type="text" id="s-sub" placeholder="Subject Line" class="input-glow save-data">
                    </div>
                    <textarea id="plain-body" class="input-glow h-16 save-data" placeholder="Text Content..."></textarea>
                    <textarea id="s-body" oninput="updatePreview()" class="input-glow font-mono text-[10px] h-[300px] custom-scroll save-data" placeholder="HTML Payload..."></textarea>
                    <div class="bg-white rounded-lg overflow-hidden h-[150px] border border-zinc-800"><iframe id="p-frame" class="w-full h-full border-0"></iframe></div>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="glass-card h-full flex flex-col">
                <div class="p-4 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-zinc-500 tracking-[3px] uppercase">Live Monitor</h3>
                    <button onclick="document.getElementById('log').innerHTML=''" class="text-[9px] text-red-500 font-bold">Wipe</button>
                </div>
                <div id="log-container" class="p-4 custom-scroll"><div id="log" class="space-y-2 font-mono text-[9px]"></div></div>
            </div>
        </div>
    </div>

    <canvas id="comp-canvas" class="hidden"></canvas>

    <script>
        let smtps = [], targets = [], sent = 0, fail = 0, isRunning = false;
        let attachmentBase64 = null, attachmentName = null;

        // --- COMPRESSION ENGINE ---
        document.getElementById('f-attach').onchange = async function(e) {
            const file = e.target.files[0];
            const info = document.getElementById('file-info');
            if (!file) return;

            attachmentName = file.name;
            const isImage = file.type.startsWith('image/');

            if (isImage) {
                info.innerText = "Processing & Compressing...";
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.getElementById('comp-canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Scale down if image is huge
                        let width = img.width;
                        let height = img.height;
                        const maxSide = 800; 
                        if (width > height && width > maxSide) { height *= maxSide / width; width = maxSide; }
                        else if (height > maxSide) { width *= maxSide / height; height = maxSide; }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // High quality but aggressive compression for low file size
                        attachmentBase64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                        const newSize = Math.round((attachmentBase64.length * 3/4) / 1024);
                        info.innerHTML = `<span class="text-green-500">OPTIMIZED: ${newSize}KB</span>`;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                // PDF or other files - Standard Base64
                const sizeKB = (file.size / 1024).toFixed(1);
                info.innerHTML = sizeKB > 150 ? `<span class="text-red-500">LARGE: ${sizeKB}KB</span>` : `READY: ${sizeKB}KB`;
                const reader = new FileReader();
                reader.onload = () => { attachmentBase64 = reader.result.split(',')[1]; };
                reader.readAsDataURL(file);
            }
        };

        function assemblePayload(mode) {
            const plain = document.getElementById('plain-body').value;
            const html = document.getElementById('s-body').value;
            if(mode === 'raw') return html || plain;

            // Smart Randomization
            const ghost = ['\u200B', '\u200C', '\u200D'][Math.floor(Math.random()*3)];
            return `<div style="font-family:sans-serif;">${plain.split(' ').join(ghost + ' ')}<br>${html}</div>`;
        }

        async function launch() {
            if(!smtps.length || !targets.length) return alert("Load CSV Data");
            isRunning = true; toggleUI(true);
            const mode = document.getElementById('send-mode').value;

            for(let i=0; i < targets.length; i++) {
                if(!isRunning) break;

                const smtp = smtps[i % smtps.length];
                const payload = {
                    smtpConfig: { user: smtp[0], pass: smtp[1], host: 'smtp.gmail.com', port: 465 },
                    mailData: {
                        fromName: document.getElementById('s-name').value,
                        to: targets[i][0],
                        subject: document.getElementById('s-sub').value,
                        html: assemblePayload(mode),
                        attachments: attachmentBase64 ? [{ filename: attachmentName, content: attachmentBase64, encoding: 'base64' }] : []
                    }
                };

                try {
                    const res = await fetch('/api/send', { 
                        method: 'POST', 
                        headers: {'Content-Type':'application/json'}, 
                        body: JSON.stringify(payload) 
                    });
                    const resData = await res.json();
                    if(res.ok && resData.success) { sent++; addLog(`SUCCESS: ${targets[i][0]}`, "text-green-400"); }
                    else { fail++; addLog(`BLOCK: ${targets[i][0]}`, "text-red-500"); }
                } catch (e) { fail++; }

                updateStats();
                const delay = parseInt(document.getElementById('send-delay').value) + (Math.random() * 800);
                await new Promise(r => setTimeout(r, delay));
            }
            isRunning = false; toggleUI(false);
        }

        // --- HELPERS ---
        function handleCSV(e, type) {
            Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: r => {
                const data = r.data.filter(x => x.length > 0);
                if(type === 'smtp') { smtps = data; document.getElementById('count-smtp').innerText = data.length; }
                else { targets = data; document.getElementById('count-target').innerText = data.length; }
            }});
        }
        document.getElementById('f-smtp').onchange = e => handleCSV(e, 'smtp');
        document.getElementById('f-target').onchange = e => handleCSV(e, 'target');
        function updateStats() { document.getElementById('v-sent').innerText = sent; document.getElementById('v-fail').innerText = fail; }
        function addLog(m, c) { const d = document.createElement('div'); d.className = c; d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`; document.getElementById('log').prepend(d); }
        function toggleUI(r) { document.getElementById('btn-start').classList.toggle('hidden', r); document.getElementById('btn-stop').classList.toggle('hidden', !r); }
        function forceStop() { isRunning = false; }
        function updatePreview() { document.getElementById('p-frame').srcdoc = assemblePayload(document.getElementById('send-mode').value); }
    </script>
</body>
</html>
