<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P7M ULTRA | Enterprise v5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --rb: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); }
        body { background-color: #030406; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .premium-border { position: relative; padding: 1px; background: var(--rb); background-size: 300% 300%; animation: rb-move 4s linear infinite; border-radius: 16px; }
        @keyframes rb-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(10, 11, 16, 0.98); backdrop-filter: blur(20px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .input-glow { background: #08090d; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; outline: none; transition: 0.3s; width: 100%; font-size: 11px; }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .btn-action { transition: 0.2s; cursor: pointer; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }
        #log-container { height: 450px; overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1900px] mx-auto grid grid-cols-12 gap-6">
        
        <div class="col-span-3 space-y-4">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg></div>
                <h1 class="text-xl font-black tracking-tighter uppercase">P7M <span class="text-blue-500">ULTRA</span></h1>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Intelligence Hub</p>
                    <div class="flex items-center justify-between bg-black/40 p-3 rounded-lg border border-white/5">
                        <span class="text-[10px] text-zinc-400 uppercase font-bold">Tunnel:</span>
                        <div id="proxy-status-light" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_5px_red]"></div>
                    </div>
                    <button onclick="connectServerProxy()" class="w-full bg-blue-600 py-3 rounded text-[10px] font-black uppercase btn-action tracking-widest">Check Connection</button>
                    <div id="ip-details" class="bg-black/50 p-3 rounded-lg text-[10px] font-mono space-y-1 min-h-[80px]">
                        <p class="text-zinc-500 italic">Standby...</p>
                    </div>
                </div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-4 space-y-3">
                    <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Rotation Protocol</p>
                    <select id="rotation-mode" class="input-glow save-data" onchange="toggleBatchInput()">
                        <option value="1-by-1">1-BY-1 (Sequential)</option>
                        <option value="random">Random (Chaos)</option>
                        <option value="continuous">Continuous (Batch)</option>
                    </select>
                    <div id="batch-container" class="hidden">
                        <input type="number" id="batch-count" value="10" placeholder="Batch Size" class="input-glow">
                    </div>
                    <select id="send-mode" class="input-glow save-data">
                        <option value="raw">Raw Send (Direct)</option>
                        <option value="smart">Smart Engine (Clean)</option>
                    </select>
                    <input type="number" id="send-delay" placeholder="Delay (MS)" value="5000" class="input-glow save-data">
                </div>
            </div>

            <div class="glass-card p-5 border-b-4 border-blue-600">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-zinc-900 p-3 rounded-xl text-center"><span class="text-[9px] text-zinc-500 uppercase font-bold">Inbox</span><p id="v-sent" class="text-3xl font-black text-green-500">0</p></div>
                    <div class="bg-zinc-900 p-3 rounded-xl text-center"><span class="text-[9px] text-zinc-500 uppercase font-bold">Block</span><p id="v-fail" class="text-3xl font-black text-red-500">0</p></div>
                </div>
                <button onclick="launch()" id="btn-start" class="w-full bg-blue-600 py-4 rounded-xl font-black text-xs uppercase btn-action">Initiate Blast</button>
                <button onclick="forceStop()" id="btn-stop" class="w-full bg-red-900/20 text-red-500 border border-red-500/50 py-4 rounded-xl font-black text-xs hidden">Stop</button>
            </div>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 border border-white/5">
                    <span class="text-[10px] font-bold text-zinc-400 uppercase">SMTPs: <b id="count-smtp" class="text-blue-500">0</b></span>
                    <input type="file" id="f-smtp" accept=".csv" class="text-[10px] w-full mt-1">
                </div>
                <div class="glass-card p-4 border border-white/5">
                    <span class="text-[10px] font-bold text-zinc-400 uppercase">Targets: <b id="count-target" class="text-green-500">0</b></span>
                    <input type="file" id="f-target" accept=".csv" class="text-[10px] w-full mt-1">
                </div>
            </div>

            <div class="premium-border">
                <div class="glass-card p-5 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-name" placeholder="Sender Name" class="input-glow save-data">
                        <input type="text" id="s-sub" placeholder="Subject Line" class="input-glow save-data">
                    </div>
                    
                    <div class="bg-blue-900/10 p-3 rounded-xl flex gap-3">
                        <input type="text" id="btn-url" placeholder="Redirect URL" class="input-glow flex-1">
                        <input type="text" id="btn-text" placeholder="Button Text" class="input-glow w-1/3">
                    </div>

                    <div class="bg-black/40 p-4 rounded-xl border border-white/10 flex items-center justify-between gap-4">
                        <div class="flex-1">
                            <p class="text-[9px] font-black text-blue-400 uppercase mb-1">Attachment Hub (Auto-Compress)</p>
                            <input type="file" id="f-attach" class="text-[10px] w-full text-zinc-400">
                        </div>
                        <div id="file-info" class="text-[10px] font-mono text-zinc-500 bg-black p-2 rounded border border-white/5 min-w-[100px] text-center">Empty</div>
                    </div>

                    <textarea id="s-body" oninput="updatePreview()" class="input-glow font-mono text-[10px] h-[250px] custom-scroll save-data" placeholder="HTML Payload Code..."></textarea>
                    <div class="bg-white rounded-lg overflow-hidden h-[180px] border border-zinc-800"><iframe id="p-frame" class="w-full h-full"></iframe></div>
                </div>
            </div>
        </div>

        <div class="col-span-3">
            <div class="glass-card h-full flex flex-col">
                <div class="p-4 border-b border-white/5 flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Live Monitor</h3>
                    <button onclick="document.getElementById('log').innerHTML=''" class="text-[9px] text-red-500 font-bold">WIPE</button>
                </div>
                <div id="log-container" class="p-4 custom-scroll"><div id="log" class="space-y-2 font-mono text-[9px]"></div></div>
            </div>
        </div>
    </div>

    <canvas id="comp-canvas" class="hidden"></canvas>

    <script>
        let smtps = [], targets = [], sent = 0, fail = 0, isRunning = false;
        let smtpPointer = 0, batchTracker = 0;
        let attachmentBase64 = null, attachmentName = null;

        function toggleBatchInput() {
            document.getElementById('batch-container').classList.toggle('hidden', document.getElementById('rotation-mode').value !== 'continuous');
        }

        async function connectServerProxy() {
            const light = document.getElementById('proxy-status-light');
            const display = document.getElementById('ip-details');
            light.className = "w-3 h-3 rounded-full bg-yellow-500 animate-pulse";
            display.innerHTML = '<span class="text-blue-400">CONNECTING...</span>';
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);

            try {
                const res = await fetch('/api/check-proxy', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal
                });
                const data = await res.json();
                clearTimeout(timeoutId);
                if (data.success) {
                    light.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_green]";
                    display.innerHTML = `IP: ${data.ip}<br>ISP: ${data.isp}<br>LOC: ${data.city}, ${data.country}`;
                } else throw new Error();
            } catch (e) {
                light.className = "w-3 h-3 rounded-full bg-red-600";
                display.innerHTML = "Status: Connection Timeout";
            }
        }

        document.getElementById('f-attach').onchange = async function(e) {
            const file = e.target.files[0];
            const info = document.getElementById('file-info');
            if (!file) return;
            attachmentName = file.name;
            if (file.type.startsWith('image/')) {
                info.innerText = "Scaling...";
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('comp-canvas');
                        let w = img.width, h = img.height;
                        if (w > 800) { h *= 800/w; w = 800; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        attachmentBase64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                        info.innerText = "IMG Ready";
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                const reader = new FileReader();
                reader.onload = () => { attachmentBase64 = reader.result.split(',')[1]; };
                reader.readAsDataURL(file);
                info.innerText = "DOC Ready";
            }
        };

        function assemblePayload(mode) {
            const html = document.getElementById('s-body').value;
            const btnUrl = document.getElementById('btn-url').value;
            const btnText = document.getElementById('btn-text').value;
            
            let btnCode = "";
            if(btnUrl && btnText) {
                btnCode = `<div style="margin:20px 0; text-align:center;"><a href="${btnUrl}" style="background:#3b82f6; color:#fff; padding:12px 25px; text-decoration:none; border-radius:5px; font-weight:bold;">${btnText}</a></div>`;
            }

            let finalHtml = html.includes('{{LINK_BUTTON}}') ? html.replace('{{LINK_BUTTON}}', btnCode) : (html + btnCode);
            if(mode === 'raw') return finalHtml;

            const ghost = ['\u200B', '\u200C'][Math.floor(Math.random()*2)];
            return `<div style="font-family:sans-serif;">${ghost}${finalHtml}</div>`;
        }

        async function launch() {
            if(!smtps.length || !targets.length) return alert("Load databases!");
            isRunning = true; toggleUI(true);
            smtpPointer = 0; batchTracker = 0;

            for(let i=0; i < targets.length; i++) {
                if(!isRunning) break;
                const rot = document.getElementById('rotation-mode').value;
                const batch = parseInt(document.getElementById('batch-count').value) || 10;
                let smtp;

                if(rot === 'random') smtp = smtps[Math.floor(Math.random() * smtps.length)];
                else if(rot === 'continuous') {
                    smtp = smtps[smtpPointer % smtps.length];
                    batchTracker++;
                    if(batchTracker >= batch) { smtpPointer++; batchTracker = 0; }
                } else smtp = smtps[i % smtps.length];

                const payload = {
                    smtpConfig: { user: smtp[0], pass: smtp[1], host: 'smtp.gmail.com', port: 465 },
                    mailData: {
                        fromName: document.getElementById('s-name').value,
                        to: targets[i][0],
                        subject: document.getElementById('s-sub').value,
                        html: assemblePayload(document.getElementById('send-mode').value),
                        attachments: attachmentBase64 ? [{ filename: attachmentName, content: attachmentBase64, encoding: 'base64' }] : []
                    }
                };

                try {
                    const res = await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                    const r = await res.json();
                    if(r.success) { sent++; addLog(`SUCCESS: ${targets[i][0]}`, "text-green-400"); }
                    else { fail++; addLog(`BLOCK: ${targets[i][0]}`, "text-red-500"); }
                } catch (e) { fail++; }

                updateStats();
                await new Promise(r => setTimeout(r, parseInt(document.getElementById('send-delay').value)));
            }
            isRunning = false; toggleUI(false);
        }

        function handleCSV(e, type) {
            Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: r => {
                const data = r.data.filter(x => x.length > 0);
                if(type === 'smtp') { smtps = data; document.getElementById('count-smtp').innerText = data.length; }
                else { targets = data; document.getElementById('count-target').innerText = data.length; }
            }});
        }
        document.getElementById('f-smtp').onchange = e => handleCSV(e, 'smtp');
        document.getElementById('f-target').onchange = e => handleCSV(e, 'target');
        function updateStats() { document.getElementById('v-sent').innerText = sent; document.getElementById('v-fail').innerText = fail; }
        function addLog(m, c) { const d = document.createElement('div'); d.className = c; d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`; document.getElementById('log').prepend(d); }
        function toggleUI(r) { document.getElementById('btn-start').classList.toggle('hidden', r); document.getElementById('btn-stop').classList.toggle('hidden', !r); }
        function forceStop() { isRunning = false; }
        function updatePreview() { document.getElementById('p-frame').srcdoc = assemblePayload('raw'); }
    </script>
</body>
</html>
